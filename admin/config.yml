backend:
  name: git-gateway
  branch: main
  repo: mimmyslifeclover-ui/mlcwebsite

media_folder: ""
public_folder: ""

collections:
  - name: "pages"
    label: "Pages"
    files:
      - label: "Home Page"
        name: "home"
        file: "index.html"
        fields:
          - {label: "Title", name: "title", widget: "string"}
          - {label: "Publish Date", name: "date", widget: "datetime"}
          - {label: "Body", name: "body", widget: "markdown"}
